version: "3,.9"

services:
  server:
    build: ./backend/rttt
    container_name: django-server
    ports:
      - "8000:8000"
    networks:
      - fullstack-net
    restart: unless-stopped

  client:
    build: ./RTTT
    container_name: react-app
    ports:
      - "5173:3000"
    networks:
      - fullstack-net
    depends_on:
      - server 
    restart: unless-stopped

networks:
  fullstack-net:
    driver: bridge